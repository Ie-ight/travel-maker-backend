<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카카오 로그인 테스트</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { background: #FEE500; border: none; padding: 12px 24px; cursor: pointer; font-size: 16px; border-radius: 6px; }
        pre { background: #f4f4f4; padding: 16px; border-radius: 6px; overflow-x: auto; }
        .token-box { margin-top: 20px; }
        .action-btn { background: #333; color: white; margin: 8px 4px; border-radius: 6px; }
    </style>
</head>
<body>
    <h2>카카오 소셜 로그인 테스트</h2>

    <button onclick="kakaoLogin()">카카오 로그인</button>
    <button class="action-btn" style="margin-left:8px" onclick="window.location.href='/console.html'">← 콘솔로 돌아가기</button>

    <div class="token-box" id="result" style="display:none">
        <h3>결과</h3>
        <pre id="result-text"></pre>

        <button class="action-btn" onclick="logout()">로그아웃</button>
        <button class="action-btn" onclick="refreshToken()">토큰 재발급</button>
        <button class="action-btn" onclick="goWithdrawal()">회원탈퇴 테스트 →</button>
        <button class="action-btn" style="background:#6366f1" onclick="window.location.href='/console.html'">← 콘솔로 돌아가기</button>
    </div>

    <script>
        const API = 'http://localhost:8000';
        const KAKAO_CLIENT_ID = 'aa52a2618c356d5346c98fa3914415c2';
        const REDIRECT_URI = 'http://localhost:3000/social-callback';
        const CONSOLE_URL  = '/console.html';

        let accessToken = '';

        function kakaoLogin() {
            const url = `https://kauth.kakao.com/oauth/authorize?client_id=${KAKAO_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code`;
            window.location.href = url;
        }

        // 콜백 처리
        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            if (!code) return;

            window.history.replaceState({}, '', '/social-callback');

            const purpose = localStorage.getItem('tm_login_purpose') || 'login';
            localStorage.removeItem('tm_login_purpose');
            const isRecovery = state === 'recovery' || purpose === 'recovery';

            showResult(isRecovery ? '계정 복구 처리 중...' : '로그인 처리 중...');

            try {
                const endpoint = isRecovery ? `${API}/api/v1/auth/recovery` : `${API}/api/v1/auth/kakao/login`;
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ code }),
                });
                const data = await res.json();
                accessToken = data.access_token || '';

                // 결과를 localStorage에 저장 후 콘솔로 복귀
                const rid = isRecovery ? 'r-recovery' : 'r-login';
                localStorage.setItem('tm_cb_msg', JSON.stringify({ rid, status: res.status, data }));
                if (accessToken) localStorage.setItem('tm_tok', accessToken);
                window.location.href = CONSOLE_URL;
                return;
            } catch (e) {
                showResult({ error: e.message });
            }
        }

        async function logout() {
            const res = await fetch(`${API}/api/v1/auth/logout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}` },
                credentials: 'include',
            });
            showResult({ status: res.status, message: '로그아웃 완료' });
            accessToken = '';
        }

        async function refreshToken() {
            const res = await fetch(`${API}/api/v1/auth/token/refresh`, {
                method: 'POST',
                credentials: 'include',
            });
            const data = await res.json();
            accessToken = data.access_token || accessToken;
            showResult(data);
        }

        function goWithdrawal() {
            sessionStorage.setItem('access_token', accessToken);
            window.location.href = '/withdrawal.html';
        }

        function showResult(data) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-text').textContent =
                typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        }

        // 페이지 로드 시 콜백 처리
        handleCallback();
    </script>
</body>
</html>
