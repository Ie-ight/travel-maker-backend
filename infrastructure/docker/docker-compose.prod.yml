services:
  db:
    image: pgvector/pgvector:pg16
    container_name: travel-maker-db-prod
    env_file:
      - ../../envs/.env.prod
    environment:
      POSTGRES_DB: ${DB_NAME:-travel_maker_db}
      POSTGRES_USER: ${DB_USER:-travel_maker_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-travel_maker_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - travel_maker_network

  redis:
    image: redis:7-alpine
    container_name: travel-maker-redis-prod
    restart: always
    networks:
      - travel_maker_network

  web:
    image: mashiro2465/travel-maker-web:latest
    container_name: travel-maker-web-prod
    command: uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --max-requests 1000 --max-requests-jitter 100
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ../../logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - ../../envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - travel_maker_network

  celery_worker:
    image: mashiro2465/travel-maker-celery-worker:latest
    container_name: travel-maker-celery-worker-prod
    command: >
      sh -c "sleep 10 &&
             uv run celery -A config worker --loglevel=info -E"
    volumes:
      - ../../logs:/app/logs
    env_file:
      - ../../envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - travel_maker_network

  celery_beat:
    image: mashiro2465/travel-maker-celery-beat:latest
    container_name: travel-maker-celery-beat-prod
    command: >
      sh -c "sleep 10 &&
             uv run celery -A config beat --loglevel=info"
    volumes:
      - ../../logs:/app/logs
    env_file:
      - ../../envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - travel_maker_network

  flower:
    image: mashiro2465/travel-maker-flower:latest
    container_name: travel-maker-flower-prod
    entrypoint: []
    command: sh -c "uv run celery -A config flower --port=5555 --basic_auth=$$FLOWER_BASIC_AUTH"
    ports:
      - "5555:5555"
    env_file:
      - ../../envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - redis
    restart: always
    networks:
      - travel_maker_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  travel_maker_network:
    driver: bridge
