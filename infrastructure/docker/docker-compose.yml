services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: travel-maker-db
    environment:
      POSTGRES_DB: travel_maker_db
      POSTGRES_USER: travel_maker_user
      POSTGRES_PASSWORD: travel_maker_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_maker_user -d travel_maker_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel_maker_network

  # Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    container_name: travel-maker-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel_maker_network

  # Django Application
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: travel-maker-web
    command: uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - ../../:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../../envs/.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travel_maker_network

  # Celery Worker
  celery_worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: travel-maker-celery-worker
    command: >
      sh -c "/app/infrastructure/scripts/wait-for-it.sh db:5432 --timeout=60 --
             /app/infrastructure/scripts/wait-for-it.sh redis:6379 --timeout=60 --
             uv run celery -A config worker --loglevel=info"
    volumes:
      - ../../:/app
      - venv_volume:/app/.venv
    env_file:
      - ../../envs/.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travel_maker_network

  # Celery Beat (스케줄러 - 선택사항)
  celery_beat:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: travel-maker-celery-beat
    command: >
      sh -c "/app/infrastructure/scripts/wait-for-it.sh db:5432 --timeout=60 --
             /app/infrastructure/scripts/wait-for-it.sh redis:6379 --timeout=60 --
             uv run celery -A config beat --loglevel=info"
    volumes:
      - ../../:/app
    env_file:
      - ../../envs/.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travel_maker_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  venv_volume:

networks:
  travel_maker_network:
    driver: bridge
