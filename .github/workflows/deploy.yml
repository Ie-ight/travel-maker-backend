name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT }}
        script: |
          set -e  # 에러 발생 시 즉시 중단!

          cd ~/travel-maker-backend
          # celerybeat 임시 파일 제거 (git pull 충돌 방지)
          rm -f celerybeat-schedule*

          # Git pull 실패하면 여기서 중단
          git pull origin main

          # Nginx 설정 업데이트
          sudo cp ~/travel-maker-backend/infrastructure/nginx/nginx.conf /etc/nginx/sites-available/travel-maker
          sudo nginx -t
          sudo systemctl reload nginx

          cd infrastructure/docker
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --build

          # Static 파일 업데이트
          docker cp travel-maker-web-prod:/app/staticfiles/. /var/www/travel-maker/staticfiles/

          # 헬스체크
          sleep 10
          curl -f https://localhost/health/ -k || exit 1  # ← HTTPS로 (-k는 인증서 무시)

          echo "✅ Deployment completed successfully!"
