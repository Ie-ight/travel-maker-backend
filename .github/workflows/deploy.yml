name: Build and Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push images
      run: |
        docker compose -f infrastructure/docker/docker-compose.build.yml build
        docker compose -f infrastructure/docker/docker-compose.build.yml push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT }}
        script: |
          set -e

          cd ~/travel-maker-backend
          rm -f celerybeat-schedule*
          git checkout -- uv.lock
          git pull origin main

          sudo cp ~/travel-maker-backend/infrastructure/nginx/nginx.conf /etc/nginx/sites-available/travel-maker
          sudo nginx -t
          sudo systemctl reload nginx

          cd infrastructure/docker
          docker compose -f docker-compose.prod.yml pull
          docker image prune -f

          docker compose -f docker-compose.prod.yml up -d

          docker cp travel-maker-web-prod:/app/staticfiles/. /var/www/travel-maker/staticfiles/

          docker compose -f docker-compose.prod.yml exec -T web uv run python manage.py migrate --noinput

          sleep 10
          curl -f https://localhost/health/ -k || exit 1

          echo "✅ Deployment completed successfully!"
