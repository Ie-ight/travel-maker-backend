name: Deploy to AWS

on:
  push:
    branches: [main]  # main 브랜치에 push 시 배포

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: travel-maker
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infrastructure/docker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ECS 배포 (Fargate 사용 시)
      - name: Deploy to Amazon ECS
        run: |
          # ECS Task Definition 업데이트 및 서비스 재시작
          # aws ecs update-service --cluster travel-maker-cluster --service travel-maker-service --force-new-deployment
          echo "ECS deployment command here"

      # 또는 EC2 배포 (SSH 사용 시)
